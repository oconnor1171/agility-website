services:
  - type: web
    name: api
    runtime: node
    buildCommand: npm install
    startCommand: node api/index.js
    sourceDir: api
    envVars:
      - key: ANTHROPIC_API_KEY
        value: your-anthropic-api-key-here  # Replace with actual key

staticSites:
  - type: static
    name: website
    buildCommand: echo "No build needed"
    staticPath: .
    routes:
      - type: rewrite
        source: /api/chat
        destination: /api/chat